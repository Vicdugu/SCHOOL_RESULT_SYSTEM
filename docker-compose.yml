version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: school-result-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: school_result_system
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d school_result_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-result-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: school-result-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-result-net

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school-result-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://admin:secure_password_change_me@postgres:5432/school_result_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      JWT_EXPIRE: 7d
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - school-result-net

volumes:
  postgres_data:
  redis_data:

networks:
  school-result-net:
    driver: bridge
