name: 📦 Build & Deploy School Result System

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  CACHE_NAME: node-modules-cache

jobs:
  # ============================================
  # LINT & TEST STAGE
  # ============================================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
      
      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: true

  # ============================================
  # BUILD STAGE
  # ============================================
  build:
    name: 🏗️ Build Project
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
      
      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🔨 Build application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000' }}
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 7

  # ============================================
  # DEPLOY TO VERCEL (Production)
  # ============================================
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
      
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: dist/
      
      - name: 🚀 Deploy to Vercel Production
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true
        env:
          VERCEL_ENV: production
      
      - name: ✅ Deployment successful
        run: echo "🎉 Successfully deployed to Vercel!"

  # ============================================
  # NOTIFY ON SUCCESS/FAILURE
  # ============================================
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()
    
    steps:
      - name: ✅ All checks passed
        if: success()
        run: echo "🎉 Pipeline completed successfully!"
      
      - name: ❌ Pipeline failed
        if: failure()
        run: echo "⚠️ Pipeline failed. Check logs above for details."

  # ============================================
  # CODE QUALITY & SECURITY CHECKS (Optional)
  # ============================================
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
      
      - name: 🔐 Run Dependabot vulnerability check
        uses: github/super-linter@v5
        env:
          DEFAULT_BRANCH: main
          VALIDATE_TYPESCRIPT: true
          VALIDATE_JSX: true
          VALIDATE_CSS: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
        continue-on-error: true
